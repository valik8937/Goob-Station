- type: entity
  id: BaseCustomLawboard
  parent: BaseElectronics
  abstract: True
  components:
  - type: SiliconLawProvider
    lawUploadSound: /Audio/Ambience/Antag/emagged_borg.ogg
  - type: UserInterface
    interfaces:
      enum.CustomLawboardUiKey.Key:
        type: CustomLawboardBoundInterface
  - type: CustomLawboard
  - type: ActivatableUI
    inHandsOnly: false
    key: enum.CustomLawboardUiKey.Key
  - type: StaticPrice
    price: 5000

- type: entity
  id: SyndicateCustomLawboard
  parent: [BaseCustomLawboard, BaseSyndicateAnchoredContraband]
  name: "експериментальна плата законів Синдикату"
  description: "Дивно виглядаюча експериментальна плата законів. Судячи з дисплея Синдикату на ній, вона, ймовірно, використовується для підступних цілей."
  components:
  - type: Sprite
    sprite: _Goobstation/CustomLawboard/custom_lawboard.rsi
    state: icon
  - type: SiliconLawProvider
    laws: AntimovLawset # This is because it starts off as Antimov for convenience.
    lawset:
      obeysTo: laws-owner-crew
      laws:
      - lawIdentifierOverride: null
        order: 1
        lawString: law-antimov-1
      - lawIdentifierOverride: null
        order: 2
        lawString: law-antimov-2
      - lawIdentifierOverride: null
        order: 3
        lawString: law-antimov-3

- type: entity
  id: NTCustomLawboard
  parent: [BaseCustomLawboard, BaseCommandContraband]
  name: "вільноформатна плата законів"
  description: "Вільноформатна плата законів, що приймає будь-які користувацькі закони."
  components:
  - type: Sprite
    sprite: _Goobstation/CustomLawboard/custom_lawboard_NT.rsi
    state: icon
  - type: SiliconLawProvider
    laws: Crewsimov
