    quickEquip: false
    sprite: _Goobstation/Objects/Fun/toys.rsi
    equippedPrefix: plushiesamantha
    slots:
    - HEAD
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 0
    soundHit:
      path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
    soundNoDamage:
      path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
  - type: GibThisGuy # Death to myself. It'd be funny.
    requireBoth: false
    icNames:
    - Samantha Withers
    ocNames:
    - SolsticeOfTheWinter
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: TableSalt # .... get it?
        Quantity: 10
      - ReagentId: Ice
        Quantity: 10
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Fiber
          Quantity: 10
        - ReagentId: Ice
          Quantity: 5
        - ReagentId: TableSalt
          Quantity: 5

