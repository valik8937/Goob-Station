- type: entity
  parent: BaseSubdermalImplant
  id: DeathRattleLavalandImplant
  name: "останній Подих"
  description: "Цей імплант сповіщає локальний канал постачання та ретранслює сигнал на станційні канали медичного відділу й постачання, коли користувач у критичному стані або мертвий. Працює поза станцією; у разі смерті передаються точні координати." # Pirates: death rattle update
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      permanent: true
      whitelist:
        components:
        - MobState # admeme implanting a chair with rattle implant needs to give the chair mobstate so it can die first
    - type: MansusGraspBlockTrigger
    - type: TriggerBlocker
      requireOffStation: true # Pirates: death rattle update
    - type: TriggerOnMobstateChange
      mobState:
      - Critical # Pirates: death rattle update
      - Dead
    - type: RattleOnTrigger
      radioChannel: Supply
      targetUser: true # Pirates: death rattle update
      messages: # Pirates: death rattle update
        Dead: lavaland-deathrattle-implant-dead-message # Pirates: death rattle update
        Critical: lavaland-deathrattle-implant-critical-message # Pirates: death rattle update
      reportCoordinates: true
      relayToStationWhenOffStation: true # Pirates: death rattle update
      offStationRelayChannels: # Pirates: death rattle update
      - Medical
      - Supply

- type: entity
  id: DeathRattleLavalandImplanter
  suffix: Lavaland Death Rattle
  parent: BaseImplantOnlyImplanter
  components:
  - type: Implanter
    implant: DeathRattleLavalandImplant
