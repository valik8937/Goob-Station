# Мікросхема: Кнопка
- type: entity
  parent: BaseIntegratedCircuit
  id: CircuitButton
  name: "кнопка"
  description: "Надсилає імпульс, коли гравець використовує закритий корпус в руці."
  components:
  - type: Sprite
    state: button
  - type: CircuitButton
  - type: IntegratedCircuit
    complexity: 1
    size: 1
    activatorPins:
      - name: "Натиснуто (Out)"
        pinType: Activator
 
# Мікросхема: Динамік
- type: entity
  parent: BaseIntegratedCircuit
  id: CircuitSpeaker
  name: "динамік"
  description: "Відтворює текст із вхідного піна, коли отримує імпульс."
  components:
  - type: Sprite
    state: speaker
  - type: CircuitSpeaker
  - type: IntegratedCircuit
    complexity: 2
    size: 2
    powerDrawPerUse: 5 # Споживає 5 Вт енергії при кожному слові
    inputPins:
      - name: "Текст"
        dataType: String
    activatorPins:
      - name: "Сказати (In)"
        pinType: Activator


- type: circuitRecipe
  id: RecipeButton
  result: CircuitButton
  name: "Кнопка"
  description: "Проста фізична кнопка для корпусу."
  category: "I/O"
  cost:
    Steel: 10
    Plastic: 5

- type: circuitRecipe
  id: RecipeSpeaker
  result: CircuitSpeaker
  name: "Динамік"
  description: "Синтезатор мови."
  category: "I/O"
  cost:
    Steel: 20
    Glass: 5