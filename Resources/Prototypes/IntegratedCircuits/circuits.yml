# Мікросхема: Кнопка
- type: entity
  parent: BaseIntegratedCircuit
  id: CircuitButton
  components:
  - type: Sprite
    state: button
  - type: CircuitButton
  - type: CircuitInteractable
  - type: IntegratedCircuit
    complexity: 1
    size: 1
    activatorPins:
      - name: "Натиснуто (Out)"
        pinType: Activator
  - type: CircuitPrintable
    category: "I/O"
    cost:
      Steel: 10
      Plastic: 5
 
# Мікросхема: Динамік
- type: entity
  parent: BaseIntegratedCircuit
  id: CircuitSpeaker
  components:
  - type: Sprite
    state: speaker
  - type: CircuitSpeaker
  - type: IntegratedCircuit
    complexity: 2
    size: 2
    powerDrawPerUse: 5 # Споживає 5 Вт енергії при кожному слові
    inputPins:
      - name: "Текст"
        dataType: String
    activatorPins:
      - name: "Сказати (In)"
        pinType: Activator
  - type: CircuitPrintable
    category: "I/O"
    cost:
      Steel: 20
      Glass: 5
