# Base entity for all integrated circuits (microchips).
- type: entity
  id: BaseIntegratedCircuit
  abstract: true
  name: integrated circuit
  description: A tiny modular chip that performs a specific function inside an electronic assembly.
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_components.rsi
    state: template
  - type: Item
    size: Tiny
  - type: IntegratedCircuit
    complexity: 1
    size: 1
    cooldownPerUse: 0.1
    inputPins: []
    outputPins: []
    activatorPins: []

# Base entity for all electronic assemblies (cases).
- type: entity
  id: BaseElectronicAssembly
  abstract: true
  name: electronic assembly
  description: A case for assembling modular electronics.
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_setups.rsi
    state: setup_small
  - type: Item
    size: Small
  - type: ElectronicAssembly
    maxComponents: 25
    maxComplexity: 75
    opened: true

# Small assembly (25 size, 75 complexity)
- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblySmall
  name: electronic assembly
  description: A case used for assembling small electronics.
  components:
  - type: Sprite
    state: setup_small
  - type: Item
    size: Small
  - type: ElectronicAssembly
    maxComponents: 25
    maxComplexity: 75

# Medium assembly (50 size, 150 complexity)
- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblyMedium
  name: electronic mechanism
  description: A case used for assembling medium-sized electronics.
  components:
  - type: Sprite
    state: setup_medium
  - type: Item
    size: Normal
  - type: ElectronicAssembly
    maxComponents: 50
    maxComplexity: 150

# Large assembly (100 size, 300 complexity)
- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblyLarge
  name: electronic machine
  description: A case used for assembling large electronics.
  components:
  - type: Sprite
    state: setup_large
  - type: Item
    size: Large
  - type: ElectronicAssembly
    maxComponents: 100
    maxComplexity: 300
