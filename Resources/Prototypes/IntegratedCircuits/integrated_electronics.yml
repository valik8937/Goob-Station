# ==========================================
# 1. БАЗОВІ СУТНОСТІ (АБСТРАКТНІ)
# ==========================================
- type: entity
  id: BaseIntegratedCircuit
  abstract: true
  name: integrated circuit
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_components.rsi
    state: template
  - type: Item
    size: Tiny
  - type: IntegratedCircuit
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - ItemMask

- type: entity
  id: BaseElectronicAssembly
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_setups.rsi
  - type: Item
  - type: ElectronicAssembly
  - type: UserInterface
    interfaces:
      enum.ElectronicAssemblyUiKey.Key:
        type: ElectronicAssemblyBoundUI
  - type: ActivatableUI
    key: enum.ElectronicAssemblyUiKey.Key
    inHandsOnly: true
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        mask:
        - ItemMask
  - type: ItemSlots
    slots:
      battery_slot:
        name: Power Cell
        whitelist:
          components: [ Battery ]
  - type: PowerCellSlot
    cellSlotId: battery_slot

# ==========================================
# 2. КОРПУСИ (СПАВНЯТЬСЯ У СВІТІ)
# ==========================================
- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblySmall
  name: small electronic assembly
  components:
  - type: Sprite
    state: setup_small
  - type: Item
    size: Small
  - type: ElectronicAssembly
    maxComponents: 10
    maxComplexity: 25

- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblyMedium
  name: medium electronic assembly
  components:
  - type: Sprite
    state: setup_medium
  - type: Item
    size: Normal
  - type: ElectronicAssembly
    maxComponents: 25
    maxComplexity: 75

- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblyLarge
  name: large electronic assembly
  components:
  - type: Sprite
    state: setup_large
  - type: Item
    size: Large
  - type: ElectronicAssembly
    maxComponents: 100
    maxComplexity: 300

# ==========================================
# 3. ІНСТРУМЕНТИ
# ==========================================
- type: entity
  id: CircuitWirer
  name: circuit wirer
  description: Wiring tool for circuits.
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_tools.rsi
    state: wirer-wire
  - type: Item
    size: Small
  - type: CircuitWirer
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - ItemMask

- type: entity
  id: CircuitDebugger
  name: circuit debugger
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_tools.rsi
    state: debugger
  - type: Item
    size: Small
  - type: CircuitDebugger
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - ItemMask

# ==========================================
# 4. ПРИНТЕР
# ==========================================
- type: entity
  id: IntegratedCircuitPrinter
  name: integrated circuit printer
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_tools.rsi
    state: circuit_printer
  - type: Item
    size: Large
  - type: CircuitPrinter
    materialMax: 2500
  - type: UserInterface
    interfaces:
      enum.CircuitPrinterUiKey.Key:
        type: CircuitPrinterBoundUI
  - type: ActivatableUI
    key: enum.CircuitPrinterUiKey.Key
    inHandsOnly: false
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        mask:
        - ItemMask

# ==========================================
# 5. РЕЦЕПТИ ДЛЯ ПРИНТЕРА
# ==========================================
- type: circuitRecipe
  id: RecipeAssemblySmall
  result: ElectronicAssemblySmall
  name: Small Assembly
  description: A small case for circuitry.
  category: Assemblies
  cost:
    Steel: 100

- type: circuitRecipe
  id: RecipeAssemblyMedium
  result: ElectronicAssemblyMedium
  name: Medium Assembly
  description: A medium case for circuitry.
  category: Assemblies
  cost:
    Steel: 250

- type: circuitRecipe
  id: RecipeAssemblyLarge
  result: ElectronicAssemblyLarge
  name: Large Assembly
  description: A large case for circuitry.
  category: Assemblies
  cost:
    Steel: 500

- type: circuitRecipe
  id: RecipeWirer
  result: CircuitWirer
  name: Circuit Wirer
  description: Tool for wiring pins.
  category: Tools
  cost:
    Steel: 50

- type: circuitRecipe
  id: RecipeDebugger
  result: CircuitDebugger
  name: Circuit Debugger
  description: Tool for debugging pins.
  category: Tools
  cost:
    Steel: 50