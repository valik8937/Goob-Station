# Base entity for all integrated circuits (microchips).
# Base entity for all integrated circuits (microchips).
- type: entity
  id: BaseIntegratedCircuit
  abstract: true
  name: integrated circuit
  description: A tiny modular chip that performs a specific function.
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_components.rsi
    state: template
  - type: Item
    size: Tiny
  - type: IntegratedCircuit # Твій кастомний компонент
    complexity: 1
    size: 1
  # --- ФІЗИКА ТА КЛІКИ ---
  - type: Clickable          # Дозволяє клікати
  - type: InteractionOutline # Малює контур при наведенні
  - type: Physics            # Вмикає фізичний рух
    bodyType: Dynamic
  - type: Fixtures           # Створює хітбокс (фізичне тіло)
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15" # Маленький хітбокс для мікрочіпа
        mask:
        - ItemMask
        layer:
        - ItemLayer

# Base entity for all electronic assemblies (cases).
- type: entity
  id: BaseElectronicAssembly
  abstract: true
  name: electronic assembly
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_setups.rsi
    state: setup_small
  - type: Item
    size: Small
  - type: ElectronicAssembly # Твій кастомний компонент
  - type: UserInterface
    interfaces:
      enum.ElectronicAssemblyUiKey.Key:
        type: ElectronicAssemblyBoundUI
  - type: ActivatableUI
    key: enum.ElectronicAssemblyUiKey.Key
  # --- ФІЗИКА ТА КЛІКИ ---
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25" # Трохи більший хітбокс для коробки
        mask:
        - ItemMask
        layer:
        - ItemLayer
  # --- СЛОТИ ТА ІНШЕ ---
  - type: ItemSlots
    slots:
      battery_slot:
        name: Power Cell
        whitelist:
          components:
          - Battery
  - type: PowerCellSlot
    cellSlotId: battery_slot

