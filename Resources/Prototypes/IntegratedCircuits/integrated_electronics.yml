# ==========================================
# 1. БАЗОВІ СУТНОСТІ (АБСТРАКТНІ)
# ==========================================
- type: entity
  id: BaseIntegratedCircuit
  abstract: true
  name: integrated circuit
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_components.rsi
    state: template
  - type: Item
    size: Tiny
  - type: IntegratedCircuit
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - ItemMask

- type: entity
  id: BaseElectronicAssembly
  abstract: true
  components:
  - type: Appearance
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_setups.rsi
    layers:
    - state: setup_small
    - state: setup_small-color
  - type: Item
  - type: ElectronicAssembly
  - type: UserInterface
    interfaces:
      enum.ElectronicAssemblyUiKey.Key:
        type: ElectronicAssemblyBoundUI
      enum.AssemblyInteractUiKey.Key:
        type: AssemblyInteractBoundUI
#  - type: ActivatableUI
#    key: enum.ElectronicAssemblyUiKey.Key
#    inHandsOnly: false
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        mask:
        - ItemMask
  - type: ItemSlots
    slots:
      battery_slot:
        name: Power Cell
        whitelist:
          components: [ Battery ]
  - type: PowerCellSlot
    cellSlotId: battery_slot

# ==========================================
# 2. КОРПУСИ (СПАВНЯТЬСЯ У СВІТІ)
# ==========================================
- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblySmall
  name: small electronic assembly
  components:
  - type: Sprite
    state: setup_small
  - type: Item
    size: Small
  - type: ElectronicAssembly
    baseState: setup_small
    detailColor: "#808080"
    maxComponents: 10
    maxComplexity: 25
  - type: CircuitPrintable
    category: "Assemblies"
    cost:
      Steel: 100

- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblyMedium
  name: medium electronic assembly
  components:
  - type: Sprite
    state: setup_medium
  - type: Item
    size: Normal
  - type: ElectronicAssembly
    baseState: setup_medium
    detailColor: "#808080"
    maxComponents: 25
    maxComplexity: 75
  - type: CircuitPrintable
    category: "Assemblies"
    cost:
      Steel: 250

- type: entity
  parent: BaseElectronicAssembly
  id: ElectronicAssemblyLarge
  name: large electronic assembly
  components:
  - type: Sprite
    state: setup_large
  - type: Item
    size: Large
  - type: ElectronicAssembly
    baseState: setup_large
    detailColor: "#808080"
    maxComponents: 100
    maxComplexity: 300
  - type: CircuitPrintable
    category: "Assemblies"
    cost:
      Steel: 500

# ==========================================
# 3. ІНСТРУМЕНТИ
# ==========================================
- type: entity
  id: CircuitWirer
  name: circuit wirer
  description: Wiring tool for circuits.
  components:
  - type: Appearance
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_tools.rsi
    layers:
    - state: wirer-wire
  - type: Item
    size: Small
  - type: CircuitWirer
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - ItemMask
  - type: CircuitPrintable
    category: "Tools"
    cost:
      Steel: 50

- type: entity
  id: CircuitDebugger
  name: circuit debugger
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_tools.rsi
    state: debugger
  - type: Item
    size: Small
  - type: CircuitDebugger
  - type: UserInterface
    interfaces:
      enum.CircuitDebuggerUiKey.Key:
        type: CircuitDebuggerBoundUI
  - type: ActivatableUI
    key: enum.CircuitDebuggerUiKey.Key
    inHandsOnly: true
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        mask:
        - ItemMask
  - type: CircuitPrintable
    category: "Tools"
    cost:
      Steel: 50

# ==========================================
# 4. ПРИНТЕР
# ==========================================
- type: entity
  id: IntegratedCircuitPrinter
  name: integrated circuit printer
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_tools.rsi
    state: circuit_printer
  - type: Item
    size: Large
  - type: CircuitPrinter
    materialMax: 2500
  - type: UserInterface
    interfaces:
      enum.CircuitPrinterUiKey.Key:
        type: CircuitPrinterBoundUI
  - type: ActivatableUI
    key: enum.CircuitPrinterUiKey.Key
    inHandsOnly: false
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        mask:
        - ItemMask
