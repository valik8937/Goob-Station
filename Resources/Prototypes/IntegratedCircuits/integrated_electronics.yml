# ── Tools ──

# Circuit Wirer
- type: entity
  id: CircuitWirer
  name: circuit wirer
  description: A small wiring tool with a wire roll, soldering iron, wire cutter, and more in one package.
  components:
  - type: Sprite
    sprite: Objects/Devices/IntegratedCircuits/electronic_tools.rsi
    state: wirer-wire
  - type: Item
    size: Small
  - type: CircuitWirer

# Circuit Debugger
- type: entity
  id: CircuitDebugger
  name: circuit debugger
