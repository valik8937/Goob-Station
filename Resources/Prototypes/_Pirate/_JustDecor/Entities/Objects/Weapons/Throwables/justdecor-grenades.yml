- type: entity
  parent: SmokeGrenade
  id: SmokeGrenadeLove
  name: love grenade
  description: A grenade that releases a cloud of love-inducing smoke. Spreads feelings of affection and warmth.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Grenades/smoke.rsi
    color: "#FF6FA3"
  - type: SmokeOnTrigger
    duration: 20
    spreadAmount: 40
    solution:
      reagents:
      - ReagentId: WitchLove
        Quantity: 25

