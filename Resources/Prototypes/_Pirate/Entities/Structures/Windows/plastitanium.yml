- type: entity
  id: PlastitaniumWindowOnyx
  name: пластитанове вікно
  parent: PlastitaniumWindow
  suffix: Onyx
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _Pirate/Structures/Windows/plastitanium_window.rsi
  - type: Icon
    sprite: _Pirate/Structures/Windows/plastitanium_window.rsi
    state: full
  - type: Construction
    graph: Girder
    node: plastitaniumWindowOnyx
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1250
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ReinforcedGirder:
            min: 1
            max: 1
          ShardGlassReinforced:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 4
          SheetPlastitanium1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Repairable
    fuelCost: 40
    doAfterDelay: 10
  - type: StaticPrice
    price: 4250

