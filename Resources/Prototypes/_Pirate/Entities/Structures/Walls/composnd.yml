- type: entity
  parent: BaseWall
  id: SOLWallComposite
  name: композитна стіна
  suffix: SOL, НЕ МАПИТИ
  components:
    - type: Sprite
      sprite: Structures/Walls/plastitanium.rsi
    - type: Icon
      sprite: Structures/Walls/plastitanium.rsi
    - type: IconSmooth
      key: walls
      base: plastitanium
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 2000
          behaviors:
            - !type:SpawnEntitiesBehavior
              spawn:
                Girder:
                  min: 1
                  max: 1
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
    - type: RustRequiresPathStage # Goobstation
      pathStage: 10 # Ascension
    - type: Penetratable # Goobstation - Better snipers
      penetrateDamage: 400
      damagePenalty: 0.6
    - type: Damageable
      damageContainer: StructuralInorganic
      damageModifierSet: StructuralMetallicStrong
    - type: RadiationBlocker
      resistance: 10
