- type: entity
  parent: WallPlastitanium
  id: WallPlastitaniumOnyx
  name: "пластитанова стіна"
  suffix: Onyx
  components:
  - type: Sprite
    sprite: _Pirate/Structures/Walls/plastitanium.rsi
  - type: Icon
    sprite: _Pirate/Structures/Walls/plastitanium.rsi
  - type: Construction
    graph: Girder
    node: plastitaniumWallOnyx
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1750
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          ReinforcedGirder:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Transform
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PlastitaniumWallOnyxVisuals.DeconstructionStage:
        PlastitaniumWallOnyxVisualsLayers.Deconstruction:
          -1: { visible: false }
          0: { state: construct-0, visible: true }
          1: { state: construct-1, visible: true }
          2: { state: construct-2, visible: true }
          3: { state: construct-3, visible: true }
          4: { state: construct-4, visible: true }
          5: { state: construct-5, visible: true }
  - type: StaticPrice
    price: 5000

- type: entity
  parent: WallPlastitaniumDiagonal
  id: WallPlastitaniumDiagonalOnyx
  name: "пластитанова стіна"
  suffix: diagonal, Onyx
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _Pirate/Structures/Walls/plastitanium_diagonal.rsi
    state: state0 
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 800
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          ReinforcedGirder:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: StaticPrice
    price: 3750
        