- type: entity
  id: WallRockTitanium
  parent: WallRock
  suffix: Titanium
  components:
  - type: EntityRemap
    mask:
      AsteroidRock: AsteroidRockTitanium
      WallRockBasalt: WallRockBasaltTitanium
      WallRockChromite: WallRockChromiteTitanium
      WallRockSand: WallRockSandTitanium
      WallRockSnow: WallRockSnowTitanium
  - type: OreVein
    oreChance: 1.0
    currentOre: OreTitanium
  - type: Sprite
    layers:
      - state: rock
      - map: [ "enum.EdgeLayer.South" ]
        state: rock_south
      - map: [ "enum.EdgeLayer.East" ]
        state: rock_east
      - map: [ "enum.EdgeLayer.North" ]
        state: rock_north
      - map: [ "enum.EdgeLayer.West" ]
        state: rock_west
      - state: rock_marble
        map: [ "enum.MiningScannerVisualLayers.Overlay" ]
        visible: false

