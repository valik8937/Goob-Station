      - state: album-empty
      - state: filled-0
      - map: ["enum.StorageFillLayers.Fill"]
  - type: Icon
    sprite: _Pirate/Objects/Misc/Photo/photo_album_makeshift.rsi
    state: icon
  - type: Storage
    grid:
    - 0,0,1,1
  - type: Construction
    graph: PhotoAlbum
    node: album
