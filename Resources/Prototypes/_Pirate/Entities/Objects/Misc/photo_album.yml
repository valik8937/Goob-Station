- type: entity
  id: PhotoAlbum
  parent: BaseItem
  name: photo album
  description: A book with a bunch of memories. Put the photos in it and they will end up in the round end summary window. Use a pen to customize photo titles, descriptions, and captions.
  components:
  - type: Sprite
    sprite: _Pirate/Objects/Misc/Photo/photo_album.rsi
    layers:
      - state: album-empty
      - state: filled-0
      - map: ["enum.StorageFillLayers.Fill"]
  - type: Item
    size: Large
    storedOffset: 0,2
    shape:
    - 0,0,1,0
  - type: StorageFillVisualizer
    maxFillLevels: 5
    fillBaseName: filled
  - type: Appearance
  - type: InteractionOutline
  - type: Clickable
  - type: Icon
    sprite: _Pirate/Objects/Misc/Photo/photo_album.rsi
    state: icon
  - type: PhotoAlbum
  - type: Storage
    grid:
    - 0,0,3,1
    maxItemSize: Small
    whitelist:
      tags:
        - Photo
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container

- type: entity
  id: PhotoAlbumLoadoutSigned
  parent: PhotoAlbum
  suffix: loadout
  components:
  - type: AutoSignPhotoAlbum

