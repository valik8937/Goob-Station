- type: entity
  id: PhotoAlbumMakeshift
  parent: PhotoAlbum
  name: "саморобний фотоальбом"
  description: "Саморобна книжка зі спогадами. Покладіть туди фотографії, щоб вони потрапили у фінальне зведення раунду. Використайте ручку, щоб налаштувати назви, описи та підписи фото."
