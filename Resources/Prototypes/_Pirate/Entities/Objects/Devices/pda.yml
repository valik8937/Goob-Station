- type: entity
  parent: BasePDA
  id: AdminAssistantPDA
  name: "адміністративний асистент КПК"
  description: "По краях - каракулі ручкою, і на ній приклеєно кілька липких записок."
  components:
  - type: Sprite
    sprite: _Pirate/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
    - state: "insert_overlay"
      map: [ "enum.PdaVisualLayers.Pen" ]
      shader: "unshaded"
      visible: false
  - type: Pda
    id: AdminAssistantIDCard
    penSlot:
      startingItem: LuxuryPen
      priority: -1
      whitelist:
        tags:
        - Write
  - type: Icon
    sprite: _Pirate/Objects/Devices/pda.rsi
    state: pda-admin-assistant
  - type: CartridgeLoader
    preinstalled:
      - CrewManifestCartridge
      - NotekeeperCartridge
      - NewsReaderCartridge
      - NanoChatCartridge
      - WalletCartridge # Pirate banking

- type: entity
  parent: [ BaseMedicalPDA, BaseInterdyneContraband ]
  id: InterdyneOfficerPDA
  name: "ПДА офіцера Інтердайну"
  description: "Офіцерський ПДА Інтердайну, модифікований різними медичними сенсорами та всім необхідним для роботи офіцера Інтердайну."
  components:
  - type: Sprite
    sprite: _Pirate/Objects/Devices/pda.rsi
  - type: Pda
    id: CaptainInterdyneIDCard
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-interdyne-officer
  - type: PdaBorderColor
    borderColor: "#367450" # Pirate
    accentHColor: "#d7d7d0"
    accentVColor: "#d7d7d0"
  - type: Icon
    sprite: _Pirate/Objects/Devices/pda.rsi
    state: pda-interdyne-officer
  - type: CartridgeLoader
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NewsReaderCartridge
    - WantedListCartridge
    - MedTekCartridge
    - NanoChatCartridge # DeltaV
    - WalletCartridge # Pirate banking
    
