- type: entity
  id: SpawnPodCoffeemakerImpressaPirate
  categories: [ HideSpawnMenu ]
  name: "кавовий вантажний дроппод"
  parent: SpawnSupplyEmpty
  components:
  - type: SpawnOnDespawn
    prototype: CrateServiceCoffeemakerImpressaPirate

- type: entity
  id: SpawnPodCoffeemakerModelloPirate
  categories: [ HideSpawnMenu ]
  name: "кавовий вантажний дроппод"
  parent: SpawnSupplyEmpty
  components:
  - type: SpawnOnDespawn
    prototype: CrateServiceCoffeemakerPirate

- type: entity
  parent: BaseItem
  id: CoffeemakerDropTeleporterPirate
  name: "маяк доставки кави Impressa"
  description: "Викликає ящик із кавоваркою Impressa та всім необхідним для старту."
  components:
  - type: Sprite
    sprite: Objects/Devices/station_beacon.rsi
    state: icon
  - type: Item
    sprite: Objects/Devices/station_beacon.rsi
  - type: UseOnStationOnly
  - type: SpawnItemsOnUse
    sound: /Audio/Items/Mining/fultext_launch.ogg
    items:
    - id: SpawnPodCoffeemakerImpressaPirate
  - type: StaticPrice
    price: 0.01

- type: entity
  parent: CoffeemakerDropTeleporterPirate
  id: CoffeemakerDropTeleporterModelloPirate
  name: "маяк доставки кави Modello"
  description: "Викликає ящик із кавоваркою Modello 3 та всім необхідним."
  components:
  - type: SpawnItemsOnUse
    sound: /Audio/Items/Mining/fultext_launch.ogg
    items:
    - id: SpawnPodCoffeemakerModelloPirate
  - type: StaticPrice
    price: 0.01
