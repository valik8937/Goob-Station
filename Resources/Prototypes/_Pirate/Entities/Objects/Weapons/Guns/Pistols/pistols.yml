# Mk 32 "Universal"
- type: entity
  name: mk32 "Universal"
  parent: BaseWeaponPistol
  id: WeaponPistolUniversal
  description: Дорогий та міцний пістолет з пристойним калібром. Використовує набої .45 магнум.
  components:
  - type: Sprite
    sprite: _Pirate/Objects/Weapons/Guns/Pistols/universal.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: GunFlashlightAttachment
    offset: "0.125, 0.1875"
  - type: Clothing
    sprite: _Pirate/Objects/Weapons/Guns/Pistols/universal.rsi
  - type: Gun
    minAngle: 1
    maxAngle: 14
    angleIncrease: 6
    angleDecay: 6
    fireRate: 2.5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Pirate/Weapons/Guns/Gunshots/universal.ogg
  - type: ItemSlots
    slots:
      flashlight:
        name: weapon-upgrade-slot-name-flashlight
        priority: 5
        ejectOnBreak: true
        occludesLight: false
        whitelist:
          components:
          - GunUpgradeFlashlight
      gun_magazine:
        name: Magazine
        startingItem: MagazineUniversalMagnum
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineUniversalMagnum
      gun_chamber:
        name: Chamber
        startingItem: CartridgeMagnum
        priority: 1
        whitelist:
          tags:
            - CartridgeMagnum
  - type: UpgradeableWeapon
  - type: ContainerContainer
    containers:
      flashlight: !type:ContainerSlot
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot

- type: entity
  name: mk32 "Universal"
  parent: WeaponPistolUniversal
  id: WeaponPistolUniversalSecurity
  description: Дорогий та міцний пістолет з пристойним калібром. Використовує набої .45 магнум. Символ на ручці вказує, що ця зброя належить до старшого офіцера безпеки SCC.
  suffix: Security Loadouts

# M8
- type: entity
  name: M8
  parent: [BaseWeaponPistol, BaseSecurityContraband, SolAllianceInfo]
  id: WeaponPistolSol
  suffix: SAN
  description: Виготовлений Zavodskoi Interstellar, компактний M8 є стандартним службовим пістолетом Соляріанських збройних сил. Використовує пістолетні магазини .35 калібру.
  components:
  - type: Sprite
    sprite: _Pirate/Objects/Weapons/Guns/Pistols/sol_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: GunFlashlightAttachment
    offset: "0.03125, 0.15625"
  - type: Clothing
    sprite: _Pirate/Objects/Weapons/Guns/Pistols/sol_pistol.rsi
  - type: Gun
    fireRate: 6
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Pirate/Weapons/Guns/Gunshots/pistol.ogg
  - type: UpgradeableWeapon
  - type: ItemSlots
    slots:
      flashlight:
        name: weapon-upgrade-slot-name-flashlight
        priority: 5
        ejectOnBreak: true
        occludesLight: false
        whitelist:
          components:
          - GunUpgradeFlashlight
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistol
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      flashlight: !type:ContainerSlot
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
