# An officer without his sword is not in proper uniform.
- type: entity
  parent: [CaptainSabre, SolAllianceInfo]
  id: SANMarineSabre
  name: "шабля соляріанської морської піхоти"
  suffix: SAN
  description: "Пластитанієва кавалерійська шабля, яку видають кожному випускнику соляріанських військових академій. Офіцер без меча — це офіцер не в однострої."
  components:
    - type: Sprite
      sprite: _Pirate/Clothing/_SolAlliance/Swords/SAN_marine_officer_sword.rsi
      state: icon
    - type: Item
      sprite: _Pirate/Clothing/_SolAlliance/Swords/SAN_marine_officer_sword.rsi
      size: Normal
    - type: StaticPrice
      price: 400

- type: entity
  parent: [ClothingBeltSheath, SolAllianceInfo]
  id: ClothingBeltSheathSANMarineFilled
  name: "піхви для соляріанської шаблі"
  suffix: SAN
  description: "Вишукані піхви, призначені для офіцерського клинка."
  components:
  - type: ContainerFill
    containers:
      item:
      - SANMarineSabre

- type: entity
  name: "офіцерська шабля соляріанців"
  parent: SANMarineSabre
  id: SANOfficerSabre
  description: "Пластитанієва фехтувальна шабля, яку видають кожному випускнику соляріанських військових академій. Офіцер без меча — це офіцер не в однострої."
  components:
    - type: Sprite
      sprite: _Pirate/Clothing/_SolAlliance/Swords/SAN_officer_sword.rsi
      state: icon
    - type: Item
      sprite: _Pirate/Clothing/_SolAlliance/Swords/SAN_officer_sword.rsi
      size: Normal

- type: entity
  parent: [ClothingBeltSheath, SolAllianceInfo]
  id: ClothingBeltSheathSANOfficerFilled
  name: "піхви для соляріанської шаблі"
  suffix: SAN
  description: "Вишукані піхви, призначені для офіцерського клинка."
  components:
  - type: ContainerFill
    containers:
      item:
      - SANOfficerSabre

- type: entity
  name: "важка шабля"
  parent: CaptainSabre
  id: CaptainSabreHeavy
  description: "Ще в давні часи на Землі такими шаблями користувалися кавалеристи найвеличніших армій. Тепер це персональна зброя капітана, що зберігає пам'ять про найелітніших воїнів тих часів: важка й товста, вона майже не ріже, зате має чудову пробивну силу. Оздоблена золотом і різьбленими візерунками на руків'ї."
  components:
  - type: Sprite
    sprite: _Pirate/Objects/Weapons/Melee/Captain_sabres/heavy.rsi
  - type: MeleeWeapon
    canWideSwing: false
    attackRate: 1.7
    damage:
      types:
        Piercing: 21
      armorPenetration: 0.30
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect 
    reflectProb: .0
  - type: Tag
    tags:
    - CaptainSabreHeavy

- type: entity
  name: "шашка капітана"
  parent: CaptainSabre
  id: CaptainSabreShashka
  description: "Давня зброя Землі, якою в різні часи користувалися різні народи від Кавказу до України. Славні козаки завжди мали її при собі. Тепер вона є і в капітана космічної станції: легка, швидка й гостра, але з невеликим пробиттям."
  components:
  - type: Sprite
    sprite: _Pirate/Objects/Weapons/Melee/Captain_sabres/shashka.rsi
  - type: MeleeWeapon
    attackRate: 1.6
    damage:
      types:
        Slash: 21
      armorPenetration: -0.15
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect 
    reflectProb: .35
  - type: Item
    storedSprite:
      state: icon
      sprite: _Pirate/Objects/Weapons/Melee/Captain_sabres/shashka.rsi
    shape:
    - 0,0,0,2
  - type: Tag
    tags:
    - CaptainSabreShashka