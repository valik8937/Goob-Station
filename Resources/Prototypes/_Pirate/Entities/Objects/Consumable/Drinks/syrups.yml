- type: entity
  id: BaseFoodCondimentBottleSyrupPirate
  abstract: true
  parent: BaseFoodCondimentBottle
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
  - type: SolutionTransfer
    canChangeTransferAmount: true
    minTransferAmount: 5
    maxTransferAmount: 10
  - type: Sprite
    layers:
    - &syrupBottleOpenableLayer
      state: bottle-empty
      map: ["enum.OpenableVisuals.Layer"]
    - &syrupBottleDefaultLabelLayer
      state: label-b
    - &syrupBottleFillLayer
      state: bottle-alpha-6
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true
  - type: Item
    sprite: Objects/Consumable/Food/condiments.rsi
  - type: Icon
    state: bottle-empty

- type: entity
  id: FoodCondimentBottleCaramelSyrupPirate
  parent: BaseFoodCondimentBottleSyrupPirate
  name: "пляшка карамельного сиропу"
  description: "Пляшка з помпою, наповнена карамелізованим цукром, також відомим як карамель. Не облизувати."
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Syrup
          Quantity: 50

- type: entity
  id: FoodCondimentBottleCoffeeLiqueurSyrupPirate
  parent: BaseFoodCondimentBottleSyrupPirate
  name: "пляшка сиропу з кавовим лікером"
  description: "Пляшка з помпою, наповнена сиропом зі смаком кавового лікеру."
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: CoffeeLiqueur
          Quantity: 50
  - type: Sprite
    layers:
    - *syrupBottleOpenableLayer
    - state: label-v
    - *syrupBottleFillLayer

- type: entity
  id: FoodCondimentBottleKortaSyrupPirate
  parent: BaseFoodCondimentBottleSyrupPirate
  name: "пляшка сиропу корта"
  description: "Пляшка з помпою, наповнена сиропом корта, виготовленим із подрібнених солодких горіхів корта."
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: KortaNectarPirate
          Quantity: 50
  - type: Sprite
    layers:
    - *syrupBottleOpenableLayer
    - state: label-e
    - *syrupBottleFillLayer

- type: entity
  id: FoodCondimentBottleLaughSyrupPirate
  parent:
  - BaseFoodCondimentBottleSyrupPirate
  - BaseSyndicateContraband
  name: "пляшка сміхо-сиропу"
  description: "Пляшка з помпою, наповнена сміхо-сиропом. Шипучий і неприродно солодкий."
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: LaughinSyrup
          Quantity: 50
  - type: Sprite
    layers:
    - *syrupBottleOpenableLayer
    - state: label-h
    - *syrupBottleFillLayer
