- type: entity
  id: DrinkCoffeepotPirate
  parent: DrinkBaseCup
  name: "кавник"
  description: "Великий кавник. Вистачає на чотири стандартні чашки."
  components:
    - type: SolutionContainerManager
      solutions:
        drink:
          maxVol: 120
    - type: SolutionTransfer
      canChangeTransferAmount: true
      maxTransferAmount: 30
    - type: Sprite
      sprite: _Pirate/Objects/Consumable/Drinks/coffeepot.rsi
      state: coffeepot_empty
      layers:
        - state: coffeepot_empty
        - map: ["enum.SolutionContainerLayers.Fill"]
          state: coffeepot_fill_1
          visible: false
    - type: Icon
      sprite: _Pirate/Objects/Consumable/Drinks/coffeepot.rsi
      state: coffeepot_empty
    - type: Item
      sprite: _Pirate/Objects/Consumable/Drinks/coffeepot.rsi
    - type: Appearance
    - type: SolutionContainerVisuals
      maxFillLevels: 7
      fillBaseName: coffeepot_fill_
      changeColor: true
    - type: Coffeepot

- type: entity
  id: DrinkCoffeeCupPirate
  parent: DrinkBaseCup
  name: "кавова чашка"
  description: "Пластикова чашка для гарячих напоїв."
  components:
    - type: SolutionContainerManager
      solutions:
        drink:
          maxVol: 30
    - type: SolutionTransfer
      canChangeTransferAmount: true
      maxTransferAmount: 10
    - type: Openable
      closeable: true
      openableByHand: false
      sound: null
      closeSound: null
    - type: EmitSoundOnPickup
      sound: null
    - type: EmitSoundOnDrop
      sound: null
    - type: Sprite
      sprite: _Pirate/Objects/Consumable/Drinks/coffeemaker_drinks.rsi
      layers:
        - map: ["coffee_cup_base"]
          state: coffee
    - type: Icon
      sprite: _Pirate/Objects/Consumable/Drinks/coffeemaker_drinks.rsi
      state: coffee
    - type: Item
      sprite: _Pirate/Objects/Consumable/Drinks/coffeemaker_drinks.rsi
    - type: Appearance
    - type: DrinkableThroughLid
    - type: CoffeeCupVisuals
    - type: SolutionContainerVisuals
      maxFillLevels: 1
      fillBaseName: coffee_full_
      changeColor: false
      emptySpriteName: coffee_empty
    - type: TrashOnSolutionEmpty
      solution: drink

