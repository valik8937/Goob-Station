- type: entity
  id: FoodCondimentPacketCreamerPirate
  parent: BaseFoodCondimentPacket
  name: creamer packet
  description: A tiny packet of coffee creamer.
  components:
    - type: Tag
      tags:
        - CoffeeCondimentCreamerPirate
    - type: SolutionTransfer
      maxTransferAmount: 5
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 5
          reagents:
            - ReagentId: Cream
              Quantity: 5
    - type: Sprite
      layers:
        - state: packet-solid-2
          map: ["enum.SolutionContainerLayers.Fill"]
          visible: true
        - state: packet-layer
          map: ["enum.OpenableVisuals.Layer"]
        - state: packet-label
    - type: Appearance
    - type: SolutionContainerVisuals
      maxFillLevels: 2
      fillBaseName: packet-solid-

