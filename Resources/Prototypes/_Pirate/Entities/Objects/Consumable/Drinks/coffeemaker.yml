- type: entity
  id: BlankCoffeeCartridgePirate
  parent: BaseItem
  name: "порожній картридж для кави"
  description: "Порожній картридж для використання в системі кавоварки Моделло 3."
  components:
    - type: Sprite
      sprite: _Pirate/Objects/Consumable/Drinks/coffeemaker_cartridges.rsi
      layers:
        - map: ["enum.CoffeeCartridgeVisualLayers.Base"]
          state: cartridge_blank
    - type: Icon
      sprite: _Pirate/Objects/Consumable/Drinks/coffeemaker_cartridges.rsi
      state: cartridge_blank
    - type: Item
      sprite: _Pirate/Objects/Consumable/Drinks/coffeemaker_cartridges.rsi
      size: Tiny
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.CoffeeCartridgeVisuals.Variant:
          enum.CoffeeCartridgeVisualLayers.Base:
            Basic: { state: cartridge_basic }
            Blend: { state: cartridge_blend }
            BlueMountain: { state: cartridge_blue_mtn }
            Kilimanjaro: { state: cartridge_kilimanjaro }
            Mocha: { state: cartridge_mocha }
            Decaf: { state: cartridge_decaf }
            Bootleg: { state: cartridge_bootleg }
            Blank: { state: cartridge_blank }
    - type: StaticPrice
      price: 0.01

- type: entity
  id: CoffeeCartridgePirate
  parent: BlankCoffeeCartridgePirate
  name: "картридж для кавоварки — Caffè Generico"
  description: "Звичайний картридж із кавою для кавоварки Modello 3."
  components:
    - type: CoffeeCartridge
      charges: 5
      variant: Basic
      brewReagent: Coffee
      brewAmount: 120
      extraReagents:
        - ReagentId: Ephedrine
          Quantity: 4
    - type: Icon
      state: cartridge_basic

- type: entity
  id: CoffeeCartridgeFancyPirate
  parent: CoffeeCartridgePirate
  name: "картридж для кавоварки — Caffè Fantasioso"
  description: "Вишуканий картридж із кавою для системи Modello 3."
  components:
    - type: CoffeeCartridge
      brewReagent: Coffee
      brewAmount: 120
      extraReagents:
        - ReagentId: Tricordrazine
          Quantity: 2
        - ReagentId: Ephedrine
          Quantity: 2
      variant: Blend
      fancyVariants:
        - variant: Blend
          name: coffeemaker cartridge - Miscela di Piccione
        - variant: BlueMountain
          name: coffeemaker cartridge - Montagna Blu
        - variant: Kilimanjaro
          name: coffeemaker cartridge - Kilimangiaro

- type: entity
  id: CoffeeCartridgeDecafPirate
  parent: CoffeeCartridgePirate
  name: "картридж Каффе Декаффеінато"
  description: "Картридж із безкофеїновою кавою для системи кавоварки Моделло 3."
  components:
    - type: CoffeeCartridge
      variant: Decaf
    - type: Icon
      state: cartridge_decaf

- type: entity
  id: CoffeeCartridgeBootlegPirate
  parent: CoffeeCartridgePirate
  name: "картридж для кавоварки — ботанічна суміш"
  description: "Кустарний картридж. Працює, але гарантію анульовано."
  components:
    - type: CoffeeCartridge
      brewReagent: Coffee
      brewAmount: 120
      extraReagents:
        - ReagentId: Omnizine
          Quantity: 2
        - ReagentId: Ephedrine
          Quantity: 2
      variant: Bootleg
    - type: Icon
      state: cartridge_bootleg

- type: entity
  id: CoffeeCartridgeSyntheticPirate
  parent: CoffeeCartridgePirate
  name: "картридж Каффе Синтетіко"
  description: "Картридж із синтетичною кавою для системи кавоварки Моделло 3."
  components:
    - type: CoffeeCartridge
      brewReagent: SyntheticCoffee
      brewAmount: 120
