- type: entity
  abstract: true
  parent: ClothingBeltStorageBase
  id: ClothingBeltCombatSurgeryBase
  name: "Компактний військовий набір хірургії"
  description: "Набір, що вміщує все необхідне для роботи парамедика та санітара. Не всі оцінили, що він працював лише з курткою Фронтиру, тож нова ревізія дозволяє закріплювати його на поясі."
  components:
  - type: Storage
    whitelist:
      tags:
        - Bottle
        - Spray
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment
        - CigPack
        - PillCanister
        - Radio
        - DiscreteHealthAnalyzer
        - SurgeryTool
        - Dropper
        - Tourniquet #Goobstation
        - MedicalPatch # Goobstation
        - AutoinjectorCartridge # Goobstation
        - HandheldCrewMonitor # Goobstation
      components:
        - Hypospray
        - Injector
        - Pill
        - HandLabeler
        - SurgeryTool # Shitmed Change
        - Defibrillator # Goobstation
        - SyringeGun # Goobstation
        - GunApplySolution # Goobstation - Syndicate dart gun
        
