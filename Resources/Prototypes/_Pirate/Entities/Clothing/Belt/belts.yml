- type: entity
  parent: ClothingBeltSheath
  id: ClothingBeltSheatCaptainHeavy
  name: "піхви для важкої шаблі"
  description: "Вишукані піхви, створені для зберігання важкої капітанської шаблі."
  components:
  - type: Sprite
    sprite: _Pirate/Clothing/Belt/Captain_sheaths/heavy.rsi
    state: sheath
  - type: Clothing
    sprite: _Pirate/Clothing/Belt/Captain_sheaths/heavy.rsi
  - type: ItemSlots
    slots:
      item:
        name: Sabre
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - CaptainSabreHeavy
  - type: ItemMapper
    mapLayers:
      sheath-sabre:
        whitelist:
          tags:
          - CaptainSabreHeavy

- type: entity
  id: ClothingBeltSheathHeavyFilled
  parent: ClothingBeltSheatCaptainHeavy
  suffix: Filled, Captain
  components:
  - type: ContainerFill
    containers:
      item:
      - CaptainSabreHeavy

