#region Temperature
- type: trait
  id: TraitHeatResistant
  name: trait-heat-resistant-name
  description: trait-heat-resistant-desc
  category: Physical
  cost: 2
  conflicts:
    - TraitHeatWeakness
  components:
    - type: TempResistant
      heatModifier: 1.05

- type: trait
  id: TraitHeatWeakness
  name: trait-heat-weakness-name
  description: trait-heat-weakness-desc
  category: Physical
  cost: -1
  conflicts:
    - TraitHeatResistant
  components:
    - type: TempResistant
      heatModifier: 0.95

- type: trait
  id: TraitColdResistant
  name: trait-cold-resistant-name
  description: trait-cold-resistant-desc
  category: Physical
  cost: 2
  conflicts:
    - TraitColdWeakness
  components:
    - type: TempResistant
      coldModifier: 0.95

- type: trait
  id: TraitColdWeakness
  name: trait-cold-weakness-name
  description: trait-cold-weakness-desc
  category: Physical
  cost: -1
  conflicts:
    - TraitColdResistant
  components:
    - type: TempResistant
      coldModifier: 1.05
#endregion

#region Vision
- type: trait
  id: TraitNightVision
  name: trait-night-vision-name
  description: trait-night-vision-desc
