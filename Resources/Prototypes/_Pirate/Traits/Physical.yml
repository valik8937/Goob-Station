#region Sensory
- type: trait
  id: TraitHighPainTolerance
  name: trait-high-pain-tolerance-name
  description: trait-high-pain-tolerance-desc
  category: Physical
  cost: 5
  conflicts:
    - TraitLowPainTolerance
  conditions:
    - !type:IsSpeciesCondition
      invert: true
      species:
        - IPC
  components:
    - type: PainTolerant
      painToleranceModifier: 10

- type: trait
  id: TraitLowPainTolerance
  name: trait-low-pain-tolerance-name
  description: trait-low-pain-tolerance-desc
  category: Physical
  cost: -2
  conflicts:
    - TraitHighPainTolerance
  conditions:
    - !type:IsSpeciesCondition
      invert: true
      species:
        - IPC
  components:
    - type: PainTolerant
      painToleranceModifier: -10

- type: trait
  id: PainNumbness
  name: trait-painnumbness-name
  description: trait-painnumbness-desc
  category: Physical 
  cost: -2 
  components:
  - type: PainNumbness
#endregion

#region Movement
- type: trait
  id: WheelchairBound
  name: trait-wheelchair-bound-name
  description: trait-wheelchair-bound-desc
  category: Physical
  cost: -5
  blacklist:
    components:
      - BorgChassis
  components:
    - type: BuckleOnMapInit
      prototype: VehicleWheelchair
    - type: LegsStartParalyzed
    - type: LegsParalyzed

- type: trait
  id: MovementImpaired
  name: trait-movement-impaired-name
  description: trait-movement-impaired-desc
  traitGear: Cane
  category: Physical
  cost: -2
  blacklist:
    components:
    - BorgChassis
  components:
    - type: MovementImpaired
      impairedSpeedMultiplier: 0.6

- type: trait
  id: TraitLightStep
  name: trait-light-step-name
  description: trait-light-step-desc
  category: Physical
  cost: 1
  components:
    - type: LightStep
#endregion

