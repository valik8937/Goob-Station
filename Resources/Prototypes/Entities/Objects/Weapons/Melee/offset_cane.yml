  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/offset_canes/mime.rsi
    state: icon
  - type: Item
    sprite: Objects/Weapons/Melee/offset_canes/mime.rsi

- type: entity
  parent: OffsetCane
